# Default values for tdarr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/haveagitgat/tdarr
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8265
  serverPort: 8266
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  enabled: true
  mountPath: /app/server
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

configs:
  enabled: true
  mountPath: /app/configs
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

extraVolumes: []
extraVolumeMounts: []
extraEnvVars: []

env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"
  webUIPort: "8265"
  internalNode: "false"
  nodeName: "ServerNode"
  serverPort: "8266"

resources:
  limits:
    cpu: 1000m
    memory: 2048Mi
  requests:
    cpu: 250m
    memory: 512Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
    # - name: my-gateway
    #   namespace: networking
    #   sectionName: https
  hostnames: []
    # - app.example.com
  filters: []

ingressRoute:
  enabled: false
  annotations: {}
  entryPoints: []
  routes: []
    # - match: Host(`app.example.com`)
    #   priority: 10
    #   middlewares:
    #     - name: my-auth-middleware
    #       namespace: traefik
  tls:
    enabled: false
    secretName: ""
    options: {}

podAnnotations: {}
extraEnvFrom: []

podSecurityContext: {}

containerSecurityContext: {}

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

revisionHistoryLimit: 3

strategy:
  type: Recreate

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Node worker configuration
node:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/haveagitgat/tdarr_node
    pullPolicy: IfNotPresent
    tag: ""
  transcode:
    enabled: true
    mountPath: /transcode
    medium: ""
    sizeLimit: ""
  extraVolumes: []
  extraVolumeMounts: []
  env:
    TZ: "America/New_York"
    PUID: "1000"
    PGID: "1000"
    nodeName: "ExternalNode"
    serverPort: "8266"
  resources:
    limits:
      cpu: 4000m
      memory: 4096Mi
    requests:
      cpu: 500m
      memory: 1024Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
