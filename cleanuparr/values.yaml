# Default values for cleanuparr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/cleanuparr/cleanuparr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "" # Overrides the image tag whose default is the chart appVersion.

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
service:
  type: ClusterIP
  port: 11011
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

# Node: if you are using cert-manager.io, you'll need to add the following annotations to your ingress:
# For a cluster-wide issuer:
# cert-manager.io/cluster-issuer: letsencrypt-prod
# For a namespace-wide issuer:
# cert-manager.io/issuer: letsencrypt

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  enabled: true
  mountPath: /config
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

extraVolumes: []
extraVolumeMounts: []
extraEnvVars: []

env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"
  UMASK: "022"

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
    # - name: my-gateway
    #   namespace: networking
    #   sectionName: https
  hostnames: []
    # - app.example.com
  filters: []
    # Built-in filter (any provider):
    # - type: RequestHeaderModifier
    #   requestHeaderModifier:
    #     add:
    #       - name: X-Forwarded-Proto
    #         value: https
    #
    # ExtensionRef (Traefik middleware via Gateway API):
    # - type: ExtensionRef
    #   extensionRef:
    #     group: traefik.io
    #     kind: Middleware
    #     name: my-auth-middleware

ingressRoute:
  enabled: false
  annotations: {}
  entryPoints: []
  routes: []
    # - match: Host(`app.example.com`)
    #   priority: 10
    #   middlewares:
    #     - name: my-auth-middleware
    #       namespace: traefik
  tls:
    enabled: false
    secretName: ""
    options: {}
      # name: my-tls-option
      # namespace: traefik
podAnnotations: {}
extraEnvFrom: []

podSecurityContext: {}

containerSecurityContext: {}

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

revisionHistoryLimit: 3

strategy:
  type: Recreate

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""
