# Default values for plexmediaserver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/cleanuparr/cleanuparr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "2.5.1"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
service:
  type: ClusterIP
  port: 11011
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

# Node: if you are using cert-manager.io, you'll need to add the following annotations to your ingress:
# For a cluster-wide issuer:
# cert-manager.io/cluster-issuer: letsencrypt-prod
# For a namespace-wide issuer:
# cert-manager.io/issuer: letsencrypt

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  config:
    enabled: true
    emptyDir: false
    mountPath: /config
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: ""
    existingClaim: ""
  downloads:
    enabled: true
    emotyDir: false
    mountPath: /downloads
    accessMode: ReadWriteOnce
    size: 1000Gi
    sotrageClass: ""
    existingClaim: ""

env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"
  UMASK: "022"

resources:
  limits:
    cpu: 400m
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}
