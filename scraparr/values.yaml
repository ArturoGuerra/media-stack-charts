# Default values for scraparr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/thecfu/scraparr
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 7100
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

persistence:
  enabled: true
  mountPath: /config
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

extraVolumes: []
extraVolumeMounts: []
extraEnvVars: []

env:
  TZ: "America/New_York"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}
extraEnvFrom: []

podSecurityContext: {}

containerSecurityContext: {}

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

revisionHistoryLimit: 3

strategy:
  type: Recreate

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""
