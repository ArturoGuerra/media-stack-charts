# Default values for nzbget.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lscr.io/linuxserver/nzbget
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "" # Overrides the image tag whose default is the chart appVersion.

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
service:
  type: ClusterIP
  port: 6789
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

# Note: If you are using nginx ingress, you will need to add the following annotations to your ingress:
# nginx.ingress.kubernetes.io/proxy-send-timeout: "100m"
# nginx.ingress.kubernetes.io/proxy-buffering: "off"
# nginx.ingress.kubernetes.io/proxy-body-size: "1000m"
# nginx.ingress.kubernetes.io/ssl-redirect: "false"
# nginx.ingress.kubernetes.io/ssl-passthorugh: "true"

# nginx.ingress.kubernetes.io/configuration-snippet: |
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
#   proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
#   proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "Upgrade";

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  enabled: true
  mountPath: /config
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

downloads:
  enabled: true
  mountPath: /downloads
  size: 1000Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

extraVolumes: []
extraVolumeMounts: []
extraEnvVars: []

# Default user/password is nzbget/tegbzn6789 (see https://hub.docker.com/r/linuxserver/nzbget)
# If you want to use a different user/password set the following values or change it in the webui:
# NZBGET_USER
# NZBGET_PASS
env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"
  NZBGET_USER: ""
  NZBGET_PASS: ""

resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 300m
    memory: 512Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 300 # 5 minutes
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
    # - name: my-gateway
    #   namespace: networking
    #   sectionName: https
  hostnames: []
    # - app.example.com
  filters: []
    # Built-in filter (any provider):
    # - type: RequestHeaderModifier
    #   requestHeaderModifier:
    #     add:
    #       - name: X-Forwarded-Proto
    #         value: https
    #
    # ExtensionRef (Traefik middleware via Gateway API):
    # - type: ExtensionRef
    #   extensionRef:
    #     group: traefik.io
    #     kind: Middleware
    #     name: my-auth-middleware

ingressRoute:
  enabled: false
  annotations: {}
  entryPoints: []
  routes: []
    # - match: Host(`app.example.com`)
    #   priority: 10
    #   middlewares:
    #     - name: my-auth-middleware
    #       namespace: traefik
  tls:
    enabled: false
    secretName: ""
    options: {}
      # name: my-tls-option
      # namespace: traefik
podAnnotations: {}
extraEnvFrom: []

podSecurityContext: {}

containerSecurityContext: {}

startupProbe:
  enabled: false
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

revisionHistoryLimit: 3

strategy:
  type: Recreate

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""
