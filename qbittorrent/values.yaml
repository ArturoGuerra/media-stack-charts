# Default values for plexmediaserver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: linuxserver/qbittorrent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest" # latest, plexpass, or public

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
service:
  type: LoadBalancer
  port: 8080
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""


ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  config:
    enabled: true
    emptyDir: false
    mountPath: /config
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: ""
    existingClaim: ""
  downloads:
    enabled: true
    emptyDir: false
    mountPath: /downloads
    accessMode: ReadWriteOnce
    size: 1000Gi
    storageClass: ""
    existingClaim: ""

env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"
  CHANGE_CONFIG_DIR_OWNERSHIP: "true"
  WEBUI_PORT: "8080"

resources:
  limits:
    cpu: 2000m
    memory: 4096Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 300 # 5 minutes
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}
