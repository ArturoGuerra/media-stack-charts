{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ template "ingress.fullname" . }}
  {{- if .Values.ingressRoute.annotations }}
  annotations: {{- toYaml .Values.ingressRoute.annotations | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
  {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
  {{- range .Values.ingressRoute.routes }}
  - match: {{ .match }}
    kind: Rule
    {{- if .priority }}
    priority: {{ .priority }}
    {{- end }}
    services:
    - name: {{ template "service.fullname" $ }}
      port: {{ $.Values.service.port }}
    {{- if .middlewares }}
    middlewares:
    {{- toYaml .middlewares | nindent 4 }}
    {{- end }}
  {{- end }}
  {{- if .Values.ingressRoute.tls.enabled }}
  tls:
    {{- if .Values.ingressRoute.tls.secretName }}
    secretName: {{ .Values.ingressRoute.tls.secretName }}
    {{- end }}
    {{- if .Values.ingressRoute.tls.options }}
    options: {{- toYaml .Values.ingressRoute.tls.options | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}