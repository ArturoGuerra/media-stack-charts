# Default values for plexmediaserver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lscr.io/linuxserver/bazarr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest" # latest or development

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""
service:
  type: ClusterIP
  port: 6767
  externalTrafficPolicy: Cluster
  loadBalancerIP: ""

# Node: if you are using cert-manager.io, you'll need to add the following annotations to your ingress:
# For a cluster-wide issuer:
# cert-manager.io/cluster-issuer: letsencrypt-prod
# For a namespace-wide issuer:
# cert-manager.io/issuer: letsencrypt

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
    #  - chart-example.local
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

persistence:
  config:
    enabled: true
    emptyDir: false
    mountPath: /config
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: ""
    existingClaim: ""
  media:
    enabled: true
    emptyDir: false
    mountPath: /media
    accessMode: ReadWriteOnce
    size: 1000Gi
    storageClass: ""
    existingClaim: ""

env:
  TZ: "America/New_York"
  PUID: "1000"
  PGID: "1000"

resources:
  limits:
    cpu: 500m
    memory: 1024Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

nodeSelector: {}